<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 40px 0;
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
        }
        .mission {
            background-color: #f4f4f4;
            padding: 30px;
            margin: 20px 0;
            border-left: 4px solid #4CAF50;
        }
        .team {
            margin: 30px 0;
        }
        .team-member {
            background-color: #fff;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1>About Us</h1>
        <p>Learn more about our company and mission</p>
    </header>

    <div class="container">
        <div class="mission">
            <h2>Our Mission</h2>
            <p>We are dedicated to providing excellent service and innovative solutions to our customers.</p>
        </div>

        <div class="team">
            <h2>Our Team</h2>
            <div class="team-member">
                <h3>John Doe</h3>
                <p>Founder & CEO</p>
            </div>
            <div class="team-member">
                <h3>Jane Smith</h3>
                <p>Lead Developer</p>
            </div>
            <div class="team-member">
                <h3>Mike Johnson</h3>
                <p>Design Director</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Our Company. All rights reserved.</p>
    </footer>
</body>
</html>
